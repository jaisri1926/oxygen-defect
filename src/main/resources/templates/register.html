<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #003366, #0055aa);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 420px;
        }
        .register-header {
            background: linear-gradient(135deg, #003366, #0055aa);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 25px;
            text-align: center;
        }
        .btn-register {
            background: linear-gradient(135deg, #003366, #0055aa);
            border: none;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-register:hover { background: #0055aa; color: white; }
        .form-control:focus {
            border-color: #0055aa;
            box-shadow: 0 0 0 0.2rem rgba(0,85,170,0.25);
        }
    </style>
</head>
<body>

<div class="register-card card">
    <div class="register-header">
        <i class="fas fa-hospital fa-3x mb-3"></i>
        <h4>Oxygen Cylinder</h4>
        <p class="mb-0">Defect Detection System</p>
    </div>
    <div class="card-body p-4">
        <h5 class="text-center mb-4 text-primary">
            <i class="fas fa-user-plus me-2"></i>Register
        </h5>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" th:action="@{/register}">
            <div class="mb-3">
                <label class="form-label fw-bold">
                    <i class="fas fa-id-card me-1"></i>Full Name
                </label>
                <input type="text" name="fullName" class="form-control"
                       placeholder="Enter your full name" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">
                    <i class="fas fa-user me-1"></i>Username
                </label>
                <input type="text" name="username" class="form-control"
                       placeholder="Choose a username" required/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">
                    <i class="fas fa-lock me-1"></i>Password
                </label>
                <input type="password" name="password" class="form-control"
                       placeholder="Choose a password" required/>
            </div>
            <button type="submit" class="btn btn-register">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>

        <div class="text-center mt-3">
            <p>Already have an account?
                <a href="/login" class="text-primary fw-bold">Login here</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
