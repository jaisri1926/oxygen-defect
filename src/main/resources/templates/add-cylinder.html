<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Cylinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .navbar { background: linear-gradient(135deg, #003366, #0055aa); }
        .navbar-brand { color: white !important; }
        .card { border: none; border-radius: 15px; 
                box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #003366, #0055aa); 
                       color: white; border-radius: 15px 15px 0 0 !important; }
        .btn-primary { background: linear-gradient(135deg, #003366, #0055aa); 
                       border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #0055aa, #003366); }
        .form-control:focus { border-color: #0055aa; box-shadow: 0 0 0 0.2rem rgba(0,85,170,0.25); }
        .form-label { font-weight: 600; color: #003366; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-hospital me-2"></i>Oxygen Cylinder Defect Detection
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header py-3">
                    <h5 class="mb-0">
                        <i class="fas fa-plus-circle me-2"></i>Add New Oxygen Cylinder
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/save}" th:object="${cylinder}" method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-barcode me-1"></i>Cylinder Number
                            </label>
                            <input type="text" class="form-control" 
                                   th:field="*{cylinderNo}" 
                                   placeholder="e.g. CYL-001" required/>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-tachometer-alt me-1"></i>Pressure (bar)
                                </label>
                                <input type="number" class="form-control" 
                                       th:field="*{pressure}" 
                                       placeholder="e.g. 150" step="0.1" required/>
                                <small class="text-muted">Normal: 30 - 200 bar</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-weight me-1"></i>Weight (kg)
                                </label>
                                <input type="number" class="form-control" 
                                       th:field="*{weight}" 
                                       placeholder="e.g. 50" step="0.1" required/>
                                <small class="text-muted">Normal: 5 - 100 kg</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-thermometer-half me-1"></i>Temperature (°C)
                                </label>
                                <input type="number" class="form-control" 
                                       th:field="*{temperature}" 
                                       placeholder="e.g. 25" step="0.1" required/>
                                <small class="text-muted">Normal: 0 - 50 °C</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-valve me-1"></i>Valve Condition
                                </label>
                                <select class="form-select" th:field="*{valveCondition}">
                                    <option value="good">✅ Good</option>
                                    <option value="bad">❌ Bad</option>
                                    <option value="damaged">⚠️ Damaged</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-toggle-on me-1"></i>Status
                            </label>
                            <select class="form-select" th:field="*{status}">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-search me-2"></i>Check & Save Cylinder
                            </button>
                            <a href="/" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back to Home
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
