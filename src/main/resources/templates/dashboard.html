<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f0f4f8; }
        .navbar { background: linear-gradient(135deg, #003366, #0055aa); }
        .navbar-brand { color: white !important; }
        .nav-link { color: white !important; }
        .card { border: none; border-radius: 15px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #003366, #0055aa);
                       color: white; border-radius: 15px 15px 0 0 !important; }
        .stat-card { border-radius: 15px; color: white;
                     padding: 25px; text-align: center;
                     box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .stat-card h2 { font-size: 3rem; font-weight: bold; }
        .chart-container { position: relative; height: 300px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-hospital me-2"></i>Oxygen Cylinder Defect Detection
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/" class="btn btn-light me-2">
                <i class="fas fa-home me-1"></i>Home
            </a>
            <a href="/logout" class="btn btn-outline-light">
                <i class="fas fa-sign-out-alt me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Welcome -->
    <div class="mb-4">
        <h4 class="text-primary">
            <i class="fas fa-chart-pie me-2"></i>Dashboard
        </h4>
        <p class="text-muted">Overview of all oxygen cylinder records</p>
    </div>

    <!-- Stats Row -->
    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="stat-card"
                 style="background: linear-gradient(135deg, #003366, #0055aa);">
                <i class="fas fa-flask fa-2x mb-2"></i>
                <h2 th:text="${totalCount}">0</h2>
                <p class="mb-0">Total Cylinders</p>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="stat-card"
                 style="background: linear-gradient(135deg, #28a745, #20c997);">
                <i class="fas fa-check-circle fa-2x mb-2"></i>
                <h2 th:text="${noDefectCount}">0</h2>
                <p class="mb-0">No Defect</p>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="stat-card"
                 style="background: linear-gradient(135deg, #dc3545, #ff6b6b);">
                <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                <h2 th:text="${defectiveCount}">0</h2>
                <p class="mb-0">Defective</p>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="row mb-4">

        <!-- Pie Chart -->
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-header py-3">
                    <h5 class="mb-0">
                        <i class="fas fa-chart-pie me-2"></i>Defect Analysis
                    </h5>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="defectPieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bar Chart -->
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-header py-3">
                    <h5 class="mb-0">
                        <i class="fas fa-chart-bar me-2"></i>Valve Condition
                    </h5>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="valveBarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Summary Card -->
    <div class="card mb-4">
        <div class="card-header py-3">
            <h5 class="mb-0">
                <i class="fas fa-info-circle me-2"></i>Summary
            </h5>
        </div>
        <div class="card-body">
            <div class="row text-center">
                <div class="col-md-3 border-end">
                    <h5 class="text-primary" th:text="${totalCount}">0</h5>
                    <p class="text-muted mb-0">Total Cylinders</p>
                </div>
                <div class="col-md-3 border-end">
                    <h5 class="text-success" th:text="${noDefectCount}">0</h5>
                    <p class="text-muted mb-0">Safe Cylinders</p>
                </div>
                <div class="col-md-3 border-end">
                    <h5 class="text-danger" th:text="${defectiveCount}">0</h5>
                    <p class="text-muted mb-0">Defective Cylinders</p>
                </div>
                <div class="col-md-3">
                    <h5 class="text-warning"
                        th:text="${totalCount > 0} ? ${#numbers.formatDecimal(noDefectCount * 100.0 / totalCount, 1, 1)} + '%' : '0%'">
                    </h5>
                    <p class="text-muted mb-0">Safety Rate</p>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Chart Scripts -->
<script th:inline="javascript">
    // Get data from Thymeleaf
    var noDefectCount = [[${noDefectCount}]];
    var defectiveCount = [[${defectiveCount}]];
    var goodValve = [[${goodValve}]];
    var badValve = [[${badValve}]];
    var damagedValve = [[${damagedValve}]];

    // Pie Chart - Defect Analysis
    var pieCtx = document.getElementById('defectPieChart').getContext('2d');
    new Chart(pieCtx, {
        type: 'pie',
        data: {
            labels: ['No Defect', 'Defective'],
            datasets: [{
                data: [noDefectCount, defectiveCount],
                backgroundColor: ['#28a745', '#dc3545'],
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });

    // Bar Chart - Valve Condition
    var barCtx = document.getElementById('valveBarChart').getContext('2d');
    new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: ['Good', 'Bad', 'Damaged'],
            datasets: [{
                label: 'Number of Cylinders',
                data: [goodValve, badValve, damagedValve],
                backgroundColor: ['#28a745', '#dc3545', '#ffc107'],
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    }
                }
            }
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
