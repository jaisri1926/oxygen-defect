<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Cylinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .navbar { background: linear-gradient(135deg, #003366, #0055aa); }
        .navbar-brand { color: white !important; }
        .card { border: none; border-radius: 15px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #003366, #0055aa);
                       color: white; border-radius: 15px 15px 0 0 !important; }
        .detail-row { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .detail-label { font-weight: 600; color: #003366; }
        .badge-defective { background: #dc3545; color: white;
                           padding: 8px 20px; border-radius: 20px; font-size: 16px; }
        .badge-nodefect { background: #28a745; color: white;
                          padding: 8px 20px; border-radius: 20px; font-size: 16px; }
        .result-box { border-radius: 10px; padding: 20px; text-align: center; margin-top: 10px; }
        .result-defective { background: #fff5f5; border: 2px solid #dc3545; }
        .result-nodefect { background: #f0fff4; border: 2px solid #28a745; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-hospital me-2"></i>Oxygen Cylinder Defect Detection
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header py-3">
                    <h5 class="mb-0">
                        <i class="fas fa-info-circle me-2"></i>Cylinder Details
                    </h5>
                </div>
                <div class="card-body p-4">

                    <div class="detail-row row">
                        <div class="col-5 detail-label">
                            <i class="fas fa-barcode me-2"></i>Cylinder No
                        </div>
                        <div class="col-7" th:text="${cylinder.cylinderNo}"></div>
                    </div>

                    <div class="detail-row row">
                        <div class="col-5 detail-label">
                            <i class="fas fa-tachometer-alt me-2"></i>Pressure
                        </div>
                        <div class="col-7" th:text="${cylinder.pressure} + ' bar'"></div>
                    </div>

                    <div class="detail-row row">
                        <div class="col-5 detail-label">
                            <i class="fas fa-weight me-2"></i>Weight
                        </div>
                        <div class="col-7" th:text="${cylinder.weight} + ' kg'"></div>
                    </div>

                    <div class="detail-row row">
                        <div class="col-5 detail-label">
                            <i class="fas fa-thermometer-half me-2"></i>Temperature
                        </div>
                        <div class="col-7" th:text="${cylinder.temperature} + ' °C'"></div>
                    </div>

                    <div class="detail-row row">
                        <div class="col-5 detail-label">
                            <i class="fas fa-cog me-2"></i>Valve Condition
                        </div>
                        <div class="col-7" th:text="${cylinder.valveCondition}"></div>
                    </div>

                    <div class="detail-row row">
                        <div class="col-5 detail-label">
                            <i class="fas fa-toggle-on me-2"></i>Status
                        </div>
                        <div class="col-7" th:text="${cylinder.status}"></div>
                    </div>

                    <!-- Defect Result Box -->
                    <div th:if="${cylinder.defectStatus == 'DEFECTIVE'}" 
                         class="result-box result-defective mt-3">
                        <h4 class="text-danger">
                            ❌ DEFECTIVE CYLINDER
                        </h4>
                        <p class="text-danger mb-0">
                            This cylinder has defects and should NOT be used in emergency!
                        </p>
                    </div>

                    <div th:if="${cylinder.defectStatus == 'NO DEFECT'}" 
                         class="result-box result-nodefect mt-3">
                        <h4 class="text-success">
                            ✅ NO DEFECT FOUND
                        </h4>
                        <p class="text-success mb-0">
                            This cylinder is safe and ready for use!
                        </p>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2 mt-4">
                        <a href="/" class="btn btn-primary">
                            <i class="fas fa-arrow-left me-2"></i>Back to Home
                        </a>
                        <a th:href="@{/delete/{id}(id=${cylinder.id})}"
                           onclick="return confirm('Are you sure you want to delete?')"
                           class="btn btn-outline-danger">
                            <i class="fas fa-trash me-2"></i>Delete Cylinder
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
