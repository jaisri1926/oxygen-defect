<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload CSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .navbar { background: linear-gradient(135deg, #003366, #0055aa); }
        .navbar-brand { color: white !important; }
        .card { border: none; border-radius: 15px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #003366, #0055aa);
                       color: white; border-radius: 15px 15px 0 0 !important; }
        .upload-area { border: 2px dashed #0055aa; border-radius: 10px;
                       padding: 40px; text-align: center; background: #f8f9ff;
                       cursor: pointer; }
        .upload-area:hover { background: #e8f0ff; }
        .btn-upload { background: linear-gradient(135deg, #003366, #0055aa);
                      border: none; color: white; padding: 12px 30px;
                      border-radius: 8px; font-size: 16px; width: 100%; }
        .btn-upload:hover { background: #0055aa; color: white; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-hospital me-2"></i>Oxygen Cylinder Defect Detection
        </a>
        <div class="ms-auto">
            <a href="/" class="btn btn-light">
                <i class="fas fa-home me-1"></i>Home
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header py-3">
                    <h5 class="mb-0">
                        <i class="fas fa-file-csv me-2"></i>Upload CSV File
                    </h5>
                </div>
                <div class="card-body p-4">

                    <!-- Error Message -->
                    <div th:if="${error}"
                         class="alert alert-danger" th:text="${error}"></div>

                    <form method="post" th:action="@{/upload}"
                          enctype="multipart/form-data">

                        <div class="upload-area mb-4">
                            <i class="fas fa-cloud-upload-alt fa-4x text-primary mb-3"></i>
                            <h5 class="text-primary">Choose CSV File</h5>
                            <p class="text-muted">Upload your cylinder data CSV file</p>
                            <input type="file" name="file"
                                   accept=".csv" class="form-control mt-3" required/>
                        </div>

                        <!-- CSV Format Guide -->
                        <div class="alert alert-info mb-4">
                            <h6><i class="fas fa-info-circle me-2"></i>CSV Format:</h6>
                            <small>
                                Your CSV file must have these columns in order:<br>
                                <code>cylinderNo, pressure, weight, temperature, valveCondition, status</code>
                            </small>
                        </div>

                        <button type="submit" class="btn btn-upload">
                            <i class="fas fa-upload me-2"></i>Upload & Detect Defects
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/" class="text-primary">
                            <i class="fas fa-arrow-left me-1"></i>Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
