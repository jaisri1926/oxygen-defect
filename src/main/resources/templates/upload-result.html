<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .navbar { background: linear-gradient(135deg, #003366, #0055aa); }
        .navbar-brand { color: white !important; }
        .card { border: none; border-radius: 15px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #003366, #0055aa);
                       color: white; border-radius: 15px 15px 0 0 !important; }
        .table thead { background: #003366; color: white; }
        .badge-defective { background: #dc3545; color: white;
                           padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .badge-nodefect { background: #28a745; color: white;
                          padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .stat-card { border-radius: 10px; color: white;
                     padding: 15px; text-align: center; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-hospital me-2"></i>Oxygen Cylinder Defect Detection
        </a>
        <div class="ms-auto">
            <a href="/" class="btn btn-light">
                <i class="fas fa-home me-1"></i>Home
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Success Message -->
    <div th:if="${success}"
         class="alert alert-success mb-4">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
    </div>

    <!-- Stats Row -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="stat-card"
                 style="background: linear-gradient(135deg, #003366, #0055aa);">
                <i class="fas fa-flask fa-2x mb-2"></i>
                <h3 th:text="${totalCount}">0</h3>
                <p>Total Uploaded</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card"
                 style="background: linear-gradient(135deg, #28a745, #20c997);">
                <i class="fas fa-check-circle fa-2x mb-2"></i>
                <h3 th:text="${successCount}">0</h3>
                <p>No Defect</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card"
                 style="background: linear-gradient(135deg, #dc3545, #ff6b6b);">
                <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                <h3 th:text="${defectiveCount}">0</h3>
                <p>Defective</p>
            </div>
        </div>
    </div>

    <!-- Results Table -->
    <div class="card">
        <div class="card-header py-3">
            <h5 class="mb-0">
                <i class="fas fa-list me-2"></i>Upload Results
            </h5>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Cylinder No</th>
                        <th>Pressure</th>
                        <th>Weight</th>
                        <th>Temperature</th>
                        <th>Valve</th>
                        <th>Status</th>
                        <th>Defect Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cylinder : ${uploadedCylinders}">
                        <td th:text="${cylinder.cylinderNo}"></td>
                        <td th:text="${cylinder.pressure} + ' bar'"></td>
                        <td th:text="${cylinder.weight} + ' kg'"></td>
                        <td th:text="${cylinder.temperature} + ' °C'"></td>
                        <td th:text="${cylinder.valveCondition}"></td>
                        <td th:text="${cylinder.status}"></td>
                        <td>
                            <span th:if="${cylinder.defectStatus == 'DEFECTIVE'}"
                                  class="badge-defective">❌ DEFECTIVE</span>
                            <span th:if="${cylinder.defectStatus == 'NO DEFECT'}"
                                  class="badge-nodefect">✅ NO DEFECT</span>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="text-center mt-3">
                <a href="/" class="btn btn-primary me-2">
                    <i class="fas fa-home me-1"></i>Go to Home
                </a>
                <a href="/upload" class="btn btn-outline-primary">
                    <i class="fas fa-upload me-1"></i>Upload Another
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
